<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --bg: #071117;
      --panel: rgba(8, 18, 24, 0.88);
      --panel-2: rgba(10, 22, 30, 0.96);
      --text: #f4fbff;
      --muted: rgba(244, 251, 255, 0.72);
      --line: rgba(255,255,255,0.11);
      --line-strong: rgba(255,255,255,0.2);
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --gm-1: #078D70;
      --gm-2: #26CEAA;
      --gm-3: #98E8C1;
      --gm-4: #FFFFFF;
      --gm-5: #7BADE2;
      --gm-6: #5049CC;
      --gm-7: #3D1A78;
      --flag-gradient: linear-gradient(90deg,
        var(--gm-1) 0%,
        var(--gm-2) 16%,
        var(--gm-3) 32%,
        var(--gm-4) 48%,
        var(--gm-5) 64%,
        var(--gm-6) 82%,
        var(--gm-7) 100%);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at 12% 18%, rgba(38,206,170,0.16), transparent 0 26%),
        radial-gradient(circle at 84% 18%, rgba(80,73,204,0.18), transparent 0 28%),
        radial-gradient(circle at 62% 78%, rgba(123,173,226,0.14), transparent 0 26%),
        linear-gradient(180deg, #061016, #09141d 52%, #071117);
      color: var(--text);
      font-family: "Comfortaa", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    button {
      font: inherit;
    }

    .shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: 48% 52%;
      height: 100dvh;
      width: 100%;
    }

    .map-pane {
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: rgba(6,16,22,0.72);
    }

    #map {
      position: absolute;
      inset: 0;
      filter: saturate(1.05) contrast(1.02);
    }

    .map-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 440;
      background:
        linear-gradient(180deg, rgba(5,10,15,.42), transparent 22%, transparent 76%, rgba(5,10,15,.62)),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 36%);
    }

    .brand {
      position: absolute;
      top: 18px;
      left: 24px;
      z-index: 500;
      max-width: min(520px, calc(100% - 48px));
      pointer-events: none;
    }

    .brand h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 4vw, 58px);
      line-height: .96;
      letter-spacing: -.04em;
      font-weight: 800;
    }

    .brand p {
      margin: 0;
      max-width: 460px;
      color: var(--muted);
      font-size: clamp(14px, 1.35vw, 16px);
      line-height: 1.55;
    }

    .feed-pane {
      position: relative;
      overflow: hidden;
      background: rgba(6, 13, 18, 0.44);
    }

    .feed-topbar {
      position: absolute;
      inset: 0 0 auto 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: linear-gradient(180deg, rgba(6,13,18,.985), rgba(6,13,18,.92), rgba(6,13,18,.58), transparent);
      isolation: isolate;
    }

    .timeline-nav {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .nav-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: white;
      border-radius: 999px;
      padding: 12px 15px;
      cursor: pointer;
      transition: background .18s ease, transform .18s ease, border-color .18s ease, opacity .18s ease;
    }

    .nav-button:hover:not(:disabled) {
      background: rgba(255,255,255,.11);
      border-color: rgba(255,255,255,.2);
      transform: translateY(-1px);
    }

    .nav-button:disabled {
      opacity: .45;
      cursor: default;
    }

    .timeline-current {
      min-width: 0;
      max-width: 280px;
      padding: 10px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(14px);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .timeline-current strong,
    .timeline-current span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-current strong {
      font-size: 15px;
      letter-spacing: .02em;
    }

    .timeline-current span {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
      text-transform: none;
      letter-spacing: .02em;
    }

    .feed-count {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    #feed {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      scroll-behavior: smooth;
      padding: 112px 24px 24px;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.15) transparent;
    }

    #feed::-webkit-scrollbar { width: 10px; }
    #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; }

    .feed-inner {
      max-width: 780px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
      padding-bottom: 20vh;
    }

    .city-card {
      position: relative;
      scroll-margin-top: 124px;
    }

    .post-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      transition: transform .22s ease, border-color .22s ease, background .22s ease;
    }

    .post-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: var(--accentStripe, var(--flag-gradient));
      opacity: .98;
      z-index: 2;
    }

    .city-card.active .post-card {
      border-color: rgba(255,255,255,.2);
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      transform: translateY(-2px);
    }

    .post-content {
      padding: 22px 24px 24px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 12px;
      color: rgba(255,255,255,.84);
    }

    .chip.city::before { content: "📍"; font-size: 12px; }
    .chip.count::before { content: "✦"; font-size: 11px; opacity: .75; }

    .city-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 16px;
    }

    .city-title-row h2 {
      margin: 0;
      font-size: clamp(28px, 3.2vw, 42px);
      line-height: 1;
      letter-spacing: -.04em;
    }

    .city-subtitle {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .12em;
      white-space: nowrap;
    }

    .visit-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .visit-chip {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.78);
      border-radius: 999px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: background .18s ease, border-color .18s ease, transform .18s ease, color .18s ease;
    }

    .visit-chip:hover {
      background: rgba(255,255,255,.09);
      border-color: rgba(255,255,255,.18);
      transform: translateY(-1px);
    }

    .visit-chip.active {
      background: rgba(255,255,255,.16);
      color: white;
      border-color: rgba(255,255,255,.28);
    }

    .visit-detail {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, .95fr);
      gap: 18px;
      align-items: start;
    }

    .visit-copy {
      min-width: 0;
    }

    .visit-title {
      margin: 0 0 12px;
      font-size: 23px;
      line-height: 1.15;
      letter-spacing: -.03em;
    }

    .summary,
    .story-panel p,
    .empty-copy {
      margin: 0;
      font-size: 15px;
      line-height: 1.75;
      color: rgba(255,255,255,.84);
      white-space: pre-wrap;
    }

    .summary {
      margin-bottom: 14px;
      color: rgba(255,255,255,.9);
    }

    .story-panel {
      display: grid;
      gap: 14px;
    }

    .gallery-shell {
      position: relative;
      min-height: 280px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }

    .gallery-track {
      position: absolute;
      inset: 0;
    }

    .gallery-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .9s ease;
    }

    .gallery-slide.active { opacity: 1; }

    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-dots {
      position: absolute;
      left: 18px;
      bottom: 16px;
      z-index: 3;
      display: flex;
      gap: 8px;
    }

    .gallery-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.34);
      border: 1px solid rgba(255,255,255,.28);
      transition: transform .2s ease, background .2s ease;
    }

    .gallery-dot.active {
      background: white;
      transform: scale(1.16);
    }

    .empty-media {
      width: 100%;
      height: 100%;
      min-height: 280px;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.48);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 12px;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 26% 30%, rgba(255,255,255,.08), transparent 0 30%),
        linear-gradient(135deg, rgba(7,141,112,0.28), rgba(80,73,204,0.30));
    }

    .leaflet-container { background: #0a1218; font: inherit; }

    .pin-wrap {
      position: relative;
      width: 18px;
      height: 18px;
    }

    .pin {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: white;
      border: 3px solid var(--pinColor, #26CEAA);
      box-shadow: 0 0 0 5px rgba(255,255,255,0.06), 0 10px 22px rgba(0,0,0,.28);
      cursor: pointer;
      position: relative;
      transition: transform .15s ease, border-width .15s ease;
      pointer-events: auto;
    }

    .pin::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--pinColor, #26CEAA);
    }

    .pin:hover { transform: scale(1.08); }
    .pin-wrap.active .pin { transform: scale(1.15); border-width: 4px; }

    .city-label {
      position: absolute;
      left: 50%;
      top: -14px;
      transform: translate(-50%, -100%);
      white-space: nowrap;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(8,14,19,.92);
      border: 1px solid rgba(255,255,255,.08);
      color: white;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }

    .pin-wrap:hover .city-label,
    .pin-wrap.active .city-label { opacity: 1; }

    .plane-icon {
      width: 34px;
      height: 34px;
      transform-origin: center center;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.34));
      transition: transform .08s linear;
    }

    .plane-icon svg { display: block; width: 100%; height: 100%; }

    .route-line-all {
      stroke: rgba(255,255,255,0.08);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-line-incoming {
      stroke: rgba(255,255,255,0.5);
      stroke-width: 2.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 8 10;
    }

    .route-line-outgoing {
      stroke: rgba(255,255,255,0.82);
      stroke-width: 3.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.16));
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(10,22,30,.96);
      color: white;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content { margin: 12px 14px; font-family: inherit; }

    @media (max-width: 1100px) {
      .feed-topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .feed-count {
        align-self: center;
      }

      .timeline-nav {
        justify-content: center;
      }
    }

    @media (max-width: 980px) {
      html, body { overflow: auto; }

      .shell {
        position: relative;
        inset: auto;
        display: block;
        min-height: 100vh;
        height: auto;
      }

      .map-pane {
        position: sticky;
        top: 0;
        height: 46vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .feed-pane { min-height: 54vh; }

      #feed {
        position: relative;
        inset: auto;
        height: auto;
        overflow: visible;
      }

      .visit-detail {
        grid-template-columns: 1fr;
      }

      .timeline-nav {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="map-pane">
      <div id="map"></div>
      <div class="map-overlay"></div>
      <div class="brand">
        <h1>Explore the stories</h1>
        <p>Navigate between destinations on the map, or move through the timeline to follow my trips chronologically. Scroll through different cities to view facts, stories, and different visits!</p>
      </div>
    </section>

    <section class="feed-pane">
      <div class="feed-topbar">
        <div class="timeline-nav">
          <button id="prevVisit" class="nav-button" type="button">Previous</button>
          <div class="timeline-current">
            <strong id="currentDate">Loading</strong>
            <span id="currentPlace">Trip</span>
          </div>
          <button id="nextVisit" class="nav-button" type="button">Next</button>
        </div>
        <div class="feed-count"><span id="cityCount">0</span> cities / <span id="countryCount">0</span> countries</div>
      </div>
      <div id="feed"><div id="feedInner" class="feed-inner"></div></div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const GAY_MEN_FLAG_COLORS = ["#078D70", "#26CEAA", "#98E8C1", "#5EC8E5", "#7BADE2", "#5049CC", "#3D1A78"];
    const CSV_FIELDS = {
      id: "id",
      slug: "slug",
      title: "title",
      city: "city",
      country: "country",
      date: "date",
      lat: "lat",
      lng: "lng",
      summary: "summary",
      story: "story",
      imageFolder: "image_folder",
      imageCount: "image_count",
      imageExt: "image_ext",
      images: "images",
      imageAlt: "image_alt",
      accent: "accent"
    };

    const qs = new URLSearchParams(window.location.search);
    const csvUrl = qs.get("csv") || "content.csv";
    const feed = document.getElementById("feed");
    const feedInner = document.getElementById("feedInner");
    const prevVisitButton = document.getElementById("prevVisit");
    const nextVisitButton = document.getElementById("nextVisit");
    const currentDateEl = document.getElementById("currentDate");
    const currentPlaceEl = document.getElementById("currentPlace");
    const cityCountEl = document.getElementById("cityCount");
    const countryCountEl = document.getElementById("countryCount");

    const map = L.map("map", {
      worldCopyJump: true,
      zoomControl: false,
      attributionControl: false,
      scrollWheelZoom: true,
      minZoom: 2,
      maxZoom: 10
    }).setView([20, 10], 2.2);

    L.control.zoom({ position: "bottomleft" }).addTo(map);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 19
    }).addTo(map);

    map.on("zoomend", () => {
      if (!suppressPreferredZoomUpdate) {
        preferredZoom = map.getZoom();
      }
    });

    let visits = [];
    let cities = [];
    let cityLookup = new Map();
    let cityMarkers = new Map();
    let selectedVisitIdByCity = new Map();
    let planeMarker = null;
    let fullRouteLine = null;
    let incomingLine = null;
    let outgoingLine = null;
    let activeVisitIndex = 0;
    let animationToken = 0;
    let cameraAnimationToken = 0;
    let preferredZoom = 3.8;
    let suppressPreferredZoomUpdate = false;
    const galleryIntervals = new Map();
    const dateFormatter = new Intl.DateTimeFormat("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric",
      timeZone: "UTC"
    });

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function parseDateValue(value) {
      const raw = String(value || "").trim();
      if (!raw) return null;
      const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      const year = Number(match[1]);
      const month = Number(match[2]) - 1;
      const day = Number(match[3]);
      const timestamp = Date.UTC(year, month, day, 12, 0, 0);
      return {
        raw,
        timestamp,
        label: dateFormatter.format(new Date(timestamp))
      };
    }

    function normalizeColor(value, index) {
      const trimmed = String(value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(trimmed)) return trimmed;
      return GAY_MEN_FLAG_COLORS[index % GAY_MEN_FLAG_COLORS.length];
    }

    function parseExplicitImages(value) {
      return String(value || "")
        .split("|")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function buildNumberedImages(folder, count, ext) {
      const cleanFolder = String(folder || "").trim().replace(/\/+$/, "");
      const total = parseInt(String(count || "").trim(), 10);
      const cleanExt = String(ext || "jpg").trim().replace(/^\./, "");
      if (!cleanFolder || !Number.isFinite(total) || total < 1) return [];
      return Array.from({ length: total }, (_, imageIndex) => `${cleanFolder}/${imageIndex + 1}.${cleanExt}`);
    }

    function splitParagraphs(body) {
      return String(body || "").split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function buildCityKey(city, country) {
      const cityPart = slugify(city);
      const countryPart = slugify(country);
      return countryPart ? `${cityPart}-${countryPart}` : cityPart;
    }

    function parseCsvData(csvText) {
      const cleaned = String(csvText || "").replace(/^\uFEFF/, "");
      const parsed = Papa.parse(cleaned, {
        header: true,
        skipEmptyLines: "greedy",
        dynamicTyping: false
      });

      const rawRows = (parsed.data || []).map((row, rowIndex) => {
        const city = String(row[CSV_FIELDS.city] || "").trim();
        const country = String(row[CSV_FIELDS.country] || "").trim();
        const cityKey = buildCityKey(city, country);
        return {
          row,
          rowIndex,
          cityKey
        };
      }).filter(item => item.cityKey);

      const metadataByCity = new Map();
      rawRows.forEach(({ row, cityKey, rowIndex }) => {
        const existing = metadataByCity.get(cityKey) || {};
        metadataByCity.set(cityKey, {
          cityKey,
          city: String(row[CSV_FIELDS.city] || existing.city || "").trim(),
          country: String(row[CSV_FIELDS.country] || existing.country || "").trim(),
          lat: String(row[CSV_FIELDS.lat] || existing.lat || "").trim(),
          lng: String(row[CSV_FIELDS.lng] || existing.lng || "").trim(),
          imageFolder: String(row[CSV_FIELDS.imageFolder] || existing.imageFolder || `images/${cityKey}`).trim(),
          imageCount: String(row[CSV_FIELDS.imageCount] || existing.imageCount || "").trim(),
          imageExt: String(row[CSV_FIELDS.imageExt] || existing.imageExt || "jpg").trim(),
          imageAlt: String(row[CSV_FIELDS.imageAlt] || existing.imageAlt || "").trim(),
          accent: String(row[CSV_FIELDS.accent] || existing.accent || "").trim(),
          firstSeen: existing.firstSeen ?? rowIndex
        });
      });

      const parsedVisits = rawRows.map(({ row, rowIndex, cityKey }) => {
        const meta = metadataByCity.get(cityKey) || {};
        const parsedDate = parseDateValue(row[CSV_FIELDS.date]);
        const lat = parseFloat(String(row[CSV_FIELDS.lat] || meta.lat || "").trim());
        const lng = parseFloat(String(row[CSV_FIELDS.lng] || meta.lng || "").trim());
        const explicitImages = parseExplicitImages(row[CSV_FIELDS.images]);
        const folderImages = buildNumberedImages(
          row[CSV_FIELDS.imageFolder] || meta.imageFolder,
          row[CSV_FIELDS.imageCount] || meta.imageCount,
          row[CSV_FIELDS.imageExt] || meta.imageExt
        );
        const story = String(row[CSV_FIELDS.story] || "").trim();
        const summary = String(row[CSV_FIELDS.summary] || "").trim();

        if (!parsedDate || !Number.isFinite(lat) || !Number.isFinite(lng)) {
          return null;
        }

        return {
          id: String(row[CSV_FIELDS.id] || `${cityKey}-${parsedDate.raw}-${rowIndex + 1}`).trim(),
          slug: String(row[CSV_FIELDS.slug] || `${cityKey}-${parsedDate.raw}`).trim(),
          cityKey,
          city: String(row[CSV_FIELDS.city] || meta.city || cityKey).trim(),
          country: String(row[CSV_FIELDS.country] || meta.country || "").trim(),
          date: parsedDate.raw,
          dateLabel: parsedDate.label,
          timestamp: parsedDate.timestamp,
          lat,
          lng,
          title: String(row[CSV_FIELDS.title] || "").trim(),
          summary,
          story,
          images: explicitImages.length ? explicitImages : folderImages,
          imageAlt: String(row[CSV_FIELDS.imageAlt] || meta.imageAlt || row[CSV_FIELDS.title] || row[CSV_FIELDS.city] || "").trim(),
          themeColor: normalizeColor(row[CSV_FIELDS.accent] || meta.accent, rowIndex),
          sourceIndex: rowIndex
        };
      }).filter(Boolean);

      parsedVisits.sort((a, b) => {
        if (a.timestamp !== b.timestamp) return a.timestamp - b.timestamp;
        return a.sourceIndex - b.sourceIndex;
      });

      const groupedCities = new Map();
      parsedVisits.forEach((visit, visitIndex) => {
        const existing = groupedCities.get(visit.cityKey);
        if (existing) {
          existing.visits.push(visit);
          existing.firstVisitIndex = Math.min(existing.firstVisitIndex, visitIndex);
          return;
        }

        groupedCities.set(visit.cityKey, {
          key: visit.cityKey,
          city: visit.city,
          country: visit.country,
          lat: visit.lat,
          lng: visit.lng,
          themeColor: visit.themeColor,
          visits: [visit],
          firstVisitIndex: visitIndex
        });
      });

      const parsedCities = Array.from(groupedCities.values()).sort((a, b) => a.firstVisitIndex - b.firstVisitIndex);
      return { visits: parsedVisits, cities: parsedCities };
    }

    async function loadTrips() {
      const response = await fetch(csvUrl, { cache: "no-store" });
      if (!response.ok) throw new Error(`Failed to load CSV: ${response.status}`);
      const parsed = parseCsvData(await response.text());
      visits = parsed.visits;
      cities = parsed.cities;
      cityLookup = new Map(cities.map(city => [city.key, city]));

      selectedVisitIdByCity = new Map();
      cities.forEach(city => {
        if (city.visits[0]) selectedVisitIdByCity.set(city.key, city.visits[0].id);
      });

      if (!visits.length) {
        feedInner.innerHTML = '<div class="post-card"><div class="post-content"><h2>No valid trips found</h2><p class="summary">Add visits with a city, date, latitude, and longitude to content.csv.</p></div></div>';
        return;
      }

      renderFeed();
      renderMap();
      bindTopNav();
      cityCountEl.textContent = String(new Set(cities.map(city => city.key)).size);
      countryCountEl.textContent = String(new Set(cities.map(city => city.country).filter(Boolean)).size);
      setActiveVisit(0, { scrollCard: false, animatePlane: false, flyMap: false });
    }

    function renderFeed() {
      feedInner.innerHTML = cities.map(city => {
        const cityStyle = `style="--accentStripe: linear-gradient(180deg, ${escapeAttr(city.themeColor)}, rgba(255,255,255,0.14));"`;
        return `
          <article class="city-card" id="city-${escapeAttr(city.key)}" data-city-key="${escapeAttr(city.key)}">
            <div class="post-card" ${cityStyle}>
              <div class="post-content">
                <div class="meta-row">
                  <span class="chip city">${escapeHtml(city.city)}${city.country ? `, ${escapeHtml(city.country)}` : ""}</span>
                  <span class="chip count">${city.visits.length} ${city.visits.length === 1 ? "visit" : "visits"}</span>
                </div>
                <div class="city-title-row">
                  <h2>${escapeHtml(city.city)}</h2>
                  <div class="city-subtitle">First visit ${escapeHtml(city.visits[0].dateLabel)}</div>
                </div>
                <div class="visit-chip-row">
                  ${city.visits.map(visit => `
                    <button class="visit-chip" type="button" data-visit-id="${escapeAttr(visit.id)}">
                      ${escapeHtml(visit.dateLabel)}
                    </button>
                  `).join("")}
                </div>
                <div class="visit-detail" data-city-detail="${escapeAttr(city.key)}"></div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll("[data-visit-id]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          const visitId = button.dataset.visitId;
          const visitIndex = visits.findIndex(visit => visit.id === visitId);
          if (visitIndex >= 0) {
            setActiveVisit(visitIndex, { scrollCard: true, animatePlane: true, flyMap: true });
          }
        });
      });

      document.querySelectorAll(".city-card").forEach(card => {
        card.addEventListener("click", event => {
          if (event.target.closest("[data-visit-id]")) return;
          const cityKey = card.dataset.cityKey;
          const visitId = selectedVisitIdByCity.get(cityKey) || cityLookup.get(cityKey)?.visits[0]?.id;
          const visitIndex = visits.findIndex(visit => visit.id === visitId);
          if (visitIndex >= 0) {
            setActiveVisit(visitIndex, { scrollCard: true, animatePlane: true, flyMap: true });
          }
        });
      });
    }

    function renderCityDetails() {
      cities.forEach(city => {
        const selectedVisitId = selectedVisitIdByCity.get(city.key) || city.visits[0]?.id;
        const visit = city.visits.find(item => item.id === selectedVisitId) || city.visits[0];
        const detail = document.querySelector(`[data-city-detail="${city.key}"]`);
        if (!detail || !visit) return;

        const title = visit.title;
        const hasCopy = Boolean(visit.summary || visit.story);
        const paragraphs = splitParagraphs(visit.story);

        detail.innerHTML = `
          <div class="visit-copy">
            ${title ? `<h3 class="visit-title">${escapeHtml(title)}</h3>` : ""}
            ${visit.summary ? `<p class="summary">${escapeHtml(visit.summary)}</p>` : ""}
            ${hasCopy ? `
              <div class="story-panel">
                ${paragraphs.map(paragraph => `<p>${escapeHtml(paragraph)}</p>`).join("")}
              </div>
            ` : `<p class="empty-copy"></p>`}
          </div>
          <div class="gallery-shell" data-gallery-key="${escapeAttr(city.key)}">
            ${buildGalleryMarkup(city, visit)}
          </div>
        `;
      });

      startGalleries();
    }

    function buildGalleryMarkup(city, visit) {
      if (!visit.images.length) {
        return `<div class="empty-media">${escapeHtml(city.city)}<br>${escapeHtml(visit.dateLabel)}</div>`;
      }

      return `
        <div class="gallery-track">
          ${visit.images.map((image, imageIndex) => `
            <div class="gallery-slide${imageIndex === 0 ? " active" : ""}" data-gallery-slide="${imageIndex}">
              <img loading="lazy" src="${escapeAttr(image)}" alt="${escapeAttr(visit.imageAlt || city.city)}">
            </div>
          `).join("")}
        </div>
        ${visit.images.length > 1 ? `
          <div class="gallery-dots">
            ${visit.images.map((_, imageIndex) => `
              <span class="gallery-dot${imageIndex === 0 ? " active" : ""}" data-gallery-dot="${imageIndex}"></span>
            `).join("")}
          </div>
        ` : ""}
      `;
    }

    function startGalleries() {
      galleryIntervals.forEach(intervalId => clearInterval(intervalId));
      galleryIntervals.clear();

      document.querySelectorAll("[data-gallery-key]").forEach((gallery, galleryIndex) => {
        const slides = Array.from(gallery.querySelectorAll("[data-gallery-slide]"));
        const dots = Array.from(gallery.querySelectorAll("[data-gallery-dot]"));
        if (slides.length < 2) return;

        let current = 0;
        const apply = next => {
          current = next;
          slides.forEach((slide, slideIndex) => slide.classList.toggle("active", slideIndex === current));
          dots.forEach((dot, dotIndex) => dot.classList.toggle("active", dotIndex === current));
        };

        const intervalId = setInterval(() => apply((current + 1) % slides.length), 3200 + (galleryIndex % 3) * 260);
        galleryIntervals.set(gallery.dataset.galleryKey, intervalId);
      });
    }

    function renderMap() {
      cityMarkers.forEach(marker => marker.remove());
      cityMarkers.clear();
      if (fullRouteLine) fullRouteLine.remove();
      if (incomingLine) incomingLine.remove();
      if (outgoingLine) outgoingLine.remove();
      if (planeMarker) planeMarker.remove();

      const bounds = [];
      cities.forEach(city => {
        const icon = L.divIcon({
          className: "custom-pin-icon",
          html: `
            <div class="pin-wrap" style="--pinColor:${escapeAttr(city.themeColor)}">
              <button class="pin" type="button" aria-label="Jump to ${escapeAttr(city.city)}"></button>
              <div class="city-label">${escapeHtml(city.city)}</div>
            </div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        });

        const marker = L.marker([city.lat, city.lng], { icon, keyboard: false }).addTo(map);
        marker.on("click", () => {
          const visitId = selectedVisitIdByCity.get(city.key) || city.visits[0]?.id;
          const visitIndex = visits.findIndex(visit => visit.id === visitId);
          if (visitIndex >= 0) {
            setActiveVisit(visitIndex, { scrollCard: true, animatePlane: true, flyMap: true });
          }
        });
        cityMarkers.set(city.key, marker);
        bounds.push([city.lat, city.lng]);
      });

      if (visits.length > 1) {
        fullRouteLine = L.polyline(visits.map(visit => [visit.lat, visit.lng]), {
          color: "#FFFFFF",
          weight: 2,
          opacity: 0.08,
          smoothFactor: 1.2,
          className: "route-line-all",
          interactive: false
        }).addTo(map);
      }

      if (bounds.length === 1) {
        map.setView(bounds[0], 4);

        map.fitBounds(bounds, { padding: [70, 70], maxZoom: 4 });

559.269531 291.300781C559.269531 286.523438 555.378906 282.632812 550.601562 282.632812L539.855469 282.632812C535.078125 282.632812 531.257812 286.523438 531.257812 291.300781L531.257812 299.972656C532.472656 312.042969 524.542969 314.464844 519.222656 308.640625L444.855469 243.332031C441.390625 240.203125 441.0625 238.285156 440.703125 233.914062L440.703125 136.683594C440.46875 127.070312 439.953125 116.292969 438.894531 107.511719C434.5625 73.457031 421.367188 -0.03125 404.957031 8.175781Z" fill="#FFFFFF"/>

    function bindTopNav() {
      prevVisitButton.addEventListener("click", () => {
        if (activeVisitIndex > 0) {
          setActiveVisit(activeVisitIndex - 1, { scrollCard: true, animatePlane: true, flyMap: true });
        }
      });

      nextVisitButton.addEventListener("click", () => {
        if (activeVisitIndex < visits.length - 1) {
          setActiveVisit(activeVisitIndex + 1, { scrollCard: true, animatePlane: true, flyMap: true });
        }
      });
    }

    function setActiveVisit(nextIndex, options = {}) {
      const nextVisit = visits[nextIndex];
      if (!nextVisit) return;

      const {
        scrollCard = true,
        animatePlane = true,
        flyMap = true
      } = options;

      const previousIndex = activeVisitIndex;
      const sameIndex = nextIndex === activeVisitIndex;
      activeVisitIndex = nextIndex;
      selectedVisitIdByCity.set(nextVisit.cityKey, nextVisit.id);

      updateTimelineUI();
      renderCityDetails();
      updateCardUI();
      updateMapUI();

      if (scrollCard) {
        scrollToCityCard(nextVisit.cityKey);
      }

      if (flyMap) {
        animateMapTransition(previousIndex, activeVisitIndex);
      }

      if (planeMarker) {
        if (!animatePlane || sameIndex) {
          updateRouteHighlights(activeVisitIndex);
          const heading = getVisitOrientation(activeVisitIndex);
          setPlane(nextVisit.lat, nextVisit.lng, heading);
        } else {
          animatePlaneBetween(previousIndex, activeVisitIndex);
        }
      }
    }

    function updateTimelineUI() {
      const currentVisit = visits[activeVisitIndex];
      if (!currentVisit) return;

      currentDateEl.textContent = currentVisit.dateLabel;
      currentPlaceEl.textContent = `${currentVisit.city}${currentVisit.country ? `, ${currentVisit.country}` : ""}`;
      prevVisitButton.disabled = activeVisitIndex <= 0;
      nextVisitButton.disabled = activeVisitIndex >= visits.length - 1;
    }

    function updateCardUI() {
      const activeVisit = visits[activeVisitIndex];
      if (!activeVisit) return;

      document.querySelectorAll(".city-card").forEach(card => {
        card.classList.toggle("active", card.dataset.cityKey === activeVisit.cityKey);
      });

      document.querySelectorAll("[data-visit-id]").forEach(button => {
        const visitId = button.dataset.visitId;
        const visit = visits.find(item => item.id === visitId);
        if (!visit) return;
        button.classList.toggle("active", selectedVisitIdByCity.get(visit.cityKey) === visit.id);
      });
    }

    function scrollToCityCard(cityKey) {
      const target = document.getElementById(`city-${cityKey}`);
      if (!target) return;
      const topbar = document.querySelector(".feed-topbar");
      const topbarHeight = topbar ? topbar.offsetHeight : 0;
      const targetTop = target.offsetTop - topbarHeight - 12;
      feed.scrollTo({
        top: Math.max(0, targetTop),
        behavior: "smooth"
      });
    }

    function updateMapUI() {
      const activeVisit = visits[activeVisitIndex];
      if (!activeVisit) return;

      cityMarkers.forEach((marker, cityKey) => {
        const wrap = marker.getElement()?.querySelector(".pin-wrap");
        if (wrap) wrap.classList.toggle("active", cityKey === activeVisit.cityKey);
      });
    }

    function idealZoom() {
      if (window.innerWidth < 980) return 3.2;
      return Math.min(4.8, Math.max(3.2, map.getZoom()));
    }

    function animateMapTransition(fromIndex, toIndex) {
      const targetVisit = visits[toIndex];
      if (!targetVisit) return;

      const savedZoom = preferredZoom || map.getZoom() || idealZoom();
      const fromVisit = visits[fromIndex] || targetVisit;
      const token = ++cameraAnimationToken;

      if (fromVisit.lat === targetVisit.lat && fromVisit.lng === targetVisit.lng) {
        runProgrammaticZoom(() => {
          map.flyTo([targetVisit.lat, targetVisit.lng], savedZoom, {
            duration: 0.9,
            easeLinearity: 0.22
          });
        });
        return;
      }

      const legBounds = L.latLngBounds(
        [fromVisit.lat, fromVisit.lng],
        [targetVisit.lat, targetVisit.lng]
      );
      const legZoom = map.getBoundsZoom(legBounds.pad(0.24), false, [96, 96]);
      const midZoom = Math.min(savedZoom, legZoom);

      runProgrammaticZoom(() => {
        map.flyToBounds(legBounds.pad(0.24), {
          padding: [96, 96],
          maxZoom: midZoom,
          duration: 0.6,
          easeLinearity: 0.2
        });
      });

      window.setTimeout(() => {
        if (token !== cameraAnimationToken) return;
        runProgrammaticZoom(() => {
          map.flyTo([targetVisit.lat, targetVisit.lng], savedZoom, {
            duration: 0.75,
            easeLinearity: 0.22
          });
        });
      }, 620);
    }

    function runProgrammaticZoom(callback) {
      suppressPreferredZoomUpdate = true;
      callback();
      window.setTimeout(() => {
        suppressPreferredZoomUpdate = false;
      }, 1500);
    }

    function updateRouteHighlights(index) {
      if (incomingLine) incomingLine.remove();
      if (outgoingLine) outgoingLine.remove();

      const currentVisit = visits[index];
      const previousVisit = visits[index - 1];
      const nextVisit = visits[index + 1];

      if (previousVisit) {
        incomingLine = L.polyline([[previousVisit.lat, previousVisit.lng], [currentVisit.lat, currentVisit.lng]], {
          color: "#FFFFFF",
          weight: 2.6,
          opacity: 0.5,
          dashArray: "8 10",
          smoothFactor: 1.2,
          className: "route-line-incoming",
          interactive: false
        }).addTo(map);
      }

      if (nextVisit) {
        outgoingLine = L.polyline([[currentVisit.lat, currentVisit.lng], [nextVisit.lat, nextVisit.lng]], {
          color: "#FFFFFF",
          weight: 3.2,
          opacity: 0.82,
          smoothFactor: 1.2,
          className: "route-line-outgoing",
          interactive: false
        }).addTo(map);
      }
    }

    function animatePlaneBetween(fromIndex, toIndex) {
      if (!planeMarker || !visits[toIndex]) return;

      const token = ++animationToken;
      const fromVisit = visits[fromIndex] || visits[toIndex];
      const toVisit = visits[toIndex];
      updateRouteHighlights(toIndex);

      const fromBearing = getVisitOrientation(fromIndex);
      const toBearing = getVisitOrientation(toIndex);

      if (fromVisit.lat === toVisit.lat && fromVisit.lng === toVisit.lng) {
        setPlane(toVisit.lat, toVisit.lng, toBearing);
        return;
      }

      const duration = 1200;
      const start = performance.now();

      function frame(now) {
        if (token !== animationToken) return;
        const t = Math.min(1, (now - start) / duration);
        const eased = easeInOutCubic(t);
        const lat = fromVisit.lat + (toVisit.lat - fromVisit.lat) * eased;
        const lng = interpolateLng(fromVisit.lng, toVisit.lng, eased);
        const bearing = fromBearing + (normalizeAngleDelta(toBearing - fromBearing) * eased);
        setPlane(lat, lng, bearing);
        if (t < 1) requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }

    function setPlane(lat, lng, bearingDeg) {
      planeMarker.setLatLng([lat, lng]);
      const plane = planeMarker.getElement()?.querySelector(".plane-icon");
      if (plane) plane.style.transform = `rotate(${bearingDeg}deg)`;
    }

    function getVisitOrientation(index) {
      const currentVisit = visits[index];
      if (!currentVisit) return 0;

      const nextVisit = visits[index + 1];
      if (nextVisit && (nextVisit.lat !== currentVisit.lat || nextVisit.lng !== currentVisit.lng)) {
        return getBearing(currentVisit.lat, currentVisit.lng, nextVisit.lat, nextVisit.lng);
      }

      const previousVisit = visits[index - 1];
      if (previousVisit && (previousVisit.lat !== currentVisit.lat || previousVisit.lng !== currentVisit.lng)) {
        return getBearing(previousVisit.lat, previousVisit.lng, currentVisit.lat, currentVisit.lng);
      }

      return 0;
    }

    function getBearing(lat1, lon1, lat2, lon2) {
      const toRad = deg => deg * Math.PI / 180;
      const toDeg = rad => rad * 180 / Math.PI;
      const phi1 = toRad(lat1);
      const phi2 = toRad(lat2);
      const lambda1 = toRad(lon1);
      const lambda2 = toRad(lon2);
      const y = Math.sin(lambda2 - lambda1) * Math.cos(phi2);
      const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(lambda2 - lambda1);
      return toDeg(Math.atan2(y, x));
    }

    function interpolateLng(fromLng, toLng, t) {
      let delta = toLng - fromLng;
      if (Math.abs(delta) > 180) delta -= Math.sign(delta) * 360;
      let value = fromLng + delta * t;
      if (value > 180) value -= 360;
      if (value < -180) value += 360;
      return value;
    }

    function normalizeAngleDelta(delta) {
      let value = delta;
      while (value > 180) value -= 360;
      while (value < -180) value += 360;
      return value;
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    loadTrips().catch(error => {
      console.error(error);
      feedInner.innerHTML = '<div class="post-card"><div class="post-content"><h2>Unable to load trips</h2><p class="summary">Check that content.csv is available to the page.</p></div></div>';
    });
  </script>
</body>

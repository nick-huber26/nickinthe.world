<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --bg: #071117;
      --panel: rgba(8, 18, 24, 0.88);
      --panel-2: rgba(10, 22, 30, 0.96);
      --text: #f4fbff;
      --muted: rgba(244, 251, 255, 0.72);
      --line: rgba(255,255,255,0.11);
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --gm-1: #078D70;
      --gm-2: #26CEAA;
      --gm-3: #98E8C1;
      --gm-4: #FFFFFF;
      --gm-5: #7BADE2;
      --gm-6: #5049CC;
      --gm-7: #3D1A78;
      --flag-gradient: linear-gradient(90deg,
        var(--gm-1) 0%,
        var(--gm-2) 16%,
        var(--gm-3) 32%,
        var(--gm-4) 48%,
        var(--gm-5) 64%,
        var(--gm-6) 82%,
        var(--gm-7) 100%);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at 12% 18%, rgba(38,206,170,0.16), transparent 0 26%),
        radial-gradient(circle at 84% 18%, rgba(80,73,204,0.18), transparent 0 28%),
        radial-gradient(circle at 62% 78%, rgba(123,173,226,0.14), transparent 0 26%),
        linear-gradient(180deg, #061016, #09141d 52%, #071117);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .shell {
      display: grid;
      grid-template-columns: 48% 52%;
      height: 100vh;
      width: 100%;
    }

    .map-pane {
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: rgba(6,16,22,0.72);
    }

    #map {
      position: absolute;
      inset: 0;
      filter: saturate(1.05) contrast(1.02);
    }

    .map-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 440;
      background:
        linear-gradient(180deg, rgba(5,10,15,.42), transparent 22%, transparent 76%, rgba(5,10,15,.62)),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 36%);
    }

    .brand {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 500;
      max-width: min(520px, calc(100% - 48px));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(14px);
      font-size: 12px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,.88);
      box-shadow: var(--shadow);
    }

    .eyebrow::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--flag-gradient);
      box-shadow: 0 0 18px rgba(123,173,226,.28);
    }

    .brand h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 4vw, 58px);
      line-height: .96;
      letter-spacing: -.04em;
      font-weight: 800;
    }

    .brand p {
      margin: 0;
      max-width: 460px;
      color: var(--muted);
      font-size: clamp(14px, 1.35vw, 16px);
      line-height: 1.55;
    }

    .feed-pane {
      position: relative;
      overflow: hidden;
      background: rgba(6, 13, 18, 0.44);
    }

    .feed-topbar {
      position: absolute;
      inset: 0 0 auto 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: linear-gradient(180deg, rgba(6,13,18,.96), rgba(6,13,18,.76), transparent);
      pointer-events: none;
    }

    .feed-topbar .label,
    .feed-topbar .count {
      pointer-events: auto;
    }

    .feed-topbar .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: rgba(255,255,255,.72);
    }

    .feed-topbar .count {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
    }

    #feed {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      scroll-behavior: smooth;
      padding: 84px 24px 50vh;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.15) transparent;
    }

    #feed::-webkit-scrollbar { width: 10px; }
    #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; }

    .feed-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    .post {
      position: relative;
      min-height: min(84vh, 920px);
      display: grid;
      align-items: center;
      padding: 26px 0;
      scroll-margin-top: 82px;
    }

    .post-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      transition: transform .22s ease, border-color .22s ease, background .22s ease;
    }

    .post-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: var(--accentStripe, var(--flag-gradient));
      opacity: .98;
      z-index: 2;
    }

    .post-media {
      position: relative;
      aspect-ratio: 16 / 8.5;
      overflow: hidden;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }

    .gallery-track {
      position: absolute;
      inset: 0;
    }

    .gallery-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .9s ease;
    }

    .gallery-slide.active { opacity: 1; }

    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-dots {
      position: absolute;
      left: 18px;
      bottom: 16px;
      z-index: 3;
      display: flex;
      gap: 8px;
    }

    .gallery-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.34);
      border: 1px solid rgba(255,255,255,.28);
      transition: transform .2s ease, background .2s ease;
    }

    .gallery-dot.active {
      background: white;
      transform: scale(1.16);
    }

    .empty-media {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.48);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 12px;
      background:
        radial-gradient(circle at 26% 30%, rgba(255,255,255,.08), transparent 0 30%),
        linear-gradient(135deg, rgba(7,141,112,0.28), rgba(80,73,204,0.30));
    }

    .post-content {
      padding: 22px 24px 24px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 12px;
      color: rgba(255,255,255,.84);
    }

    .chip.city::before { content: "📍"; font-size: 12px; }
    .chip.date::before { content: "✦"; font-size: 11px; opacity: .75; }

    .post h2 {
      margin: 0 0 12px;
      font-size: clamp(26px, 3.2vw, 42px);
      line-height: 1;
      letter-spacing: -.04em;
    }

    .summary {
      margin: 0 0 16px;
      font-size: clamp(15px, 1.34vw, 18px);
      line-height: 1.62;
      color: rgba(255,255,255,.84);
    }

    .expand-toggle {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: white;
      border-radius: 999px;
      padding: 12px 14px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: background .18s ease, transform .18s ease, border-color .18s ease;
    }

    .expand-toggle:hover {
      background: rgba(255,255,255,.11);
      border-color: rgba(255,255,255,.2);
      transform: translateY(-1px);
    }

    .story-panel {
      margin-top: 14px;
      max-height: 0;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(4,11,16,.54);
      transition: max-height .34s ease, opacity .26s ease, margin-top .26s ease;
      opacity: 0;
    }

    .story-panel.open {
      max-height: 340px;
      opacity: 1;
      margin-top: 16px;
    }

    .story-scroll {
      max-height: 338px;
      overflow-y: auto;
      padding: 18px 18px 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.16) transparent;
    }

    .story-scroll::-webkit-scrollbar { width: 8px; }
    .story-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 999px; }

    .story-scroll p {
      margin: 0 0 14px;
      font-size: 15px;
      line-height: 1.75;
      color: rgba(255,255,255,.84);
      white-space: pre-wrap;
    }

    .story-scroll p:last-child { margin-bottom: 0; }

    .active .post-card {
      border-color: rgba(255,255,255,.2);
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      transform: translateY(-2px);
    }

    .leaflet-container { background: #0a1218; font: inherit; }

    .pin-wrap {
      position: relative;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
    }

    .pin {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: white;
      border: 3px solid var(--pinColor, #26CEAA);
      box-shadow: 0 0 0 5px rgba(255,255,255,0.06), 0 10px 22px rgba(0,0,0,.28);
      cursor: pointer;
      position: relative;
      transition: transform .15s ease, border-width .15s ease;
      pointer-events: auto;
    }

    .pin::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--pinColor, #26CEAA);
    }

    .pin:hover { transform: scale(1.08); }
    .pin-wrap.active .pin { transform: scale(1.15); border-width: 4px; }

    .city-label {
      position: absolute;
      left: 50%;
      top: -14px;
      transform: translate(-50%, -100%);
      white-space: nowrap;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(8,14,19,.92);
      border: 1px solid rgba(255,255,255,.08);
      color: white;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }

    .pin-wrap:hover .city-label,
    .pin-wrap.active .city-label { opacity: 1; }

    .plane-icon {
      width: 34px;
      height: 34px;
      transform-origin: center center;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.34));
      transition: transform .08s linear;
    }

    .plane-icon svg { display: block; width: 100%; height: 100%; }

    .route-line-before {
      stroke: rgba(255,255,255,0.28);
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.16));
    }

    .route-line-after {
      stroke: rgba(255,255,255,0.16);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 8 10;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(10,22,30,.96);
      color: white;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content { margin: 12px 14px; font-family: inherit; }

    @media (max-width: 980px) {
      html, body { overflow: auto; }
      .shell { display: block; min-height: 100vh; height: auto; }
      .map-pane {
        position: sticky;
        top: 0;
        height: 46vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .feed-pane { min-height: 54vh; }
      #feed {
        position: relative;
        inset: auto;
        height: auto;
        overflow: visible;
        padding-bottom: 20vh;
      }
      .post { min-height: auto; }
      .story-panel.open { max-height: 280px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="map-pane">
      <div id="map"></div>
      <div class="map-overlay"></div>
      <div class="brand">
        <div class="eyebrow">The Journey</div>
        <h1>Queer stories, mapped.</h1>
        <p>Scroll the feed to trace each stop. Click any city pin to jump to that chapter, and watch the route move with you.</p>
      </div>
    </section>

    <section class="feed-pane">
      <div class="feed-topbar">
        <div class="label">Linked map + story stream</div>
        <div class="count"><span id="postCount">0</span> posts</div>
      </div>
      <div id="feed"><div id="feedInner" class="feed-inner"></div></div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const GAY_MEN_FLAG_COLORS = ["#078D70", "#26CEAA", "#98E8C1", "#FFFFFF", "#7BADE2", "#5049CC", "#3D1A78"];

    const CSV_FIELDS = {
      id: "id",
      slug: "slug",
      city: "city",
      country: "country",
      lat: "lat",
      lng: "lng",
      title: "title",
      date: "date",
      summary: "summary",
      story: "story",
      imageFolder: "image_folder",
      imageCount: "image_count",
      imageExt: "image_ext",
      images: "images",
      imageAlt: "image_alt",
      themeColor: "accent"
    };

    const qs = new URLSearchParams(window.location.search);
    const csvUrl = qs.get("csv") || "content.csv";
    const feed = document.getElementById("feed");
    const feedInner = document.getElementById("feedInner");
    const postCount = document.getElementById("postCount");

    const map = L.map("map", {
      worldCopyJump: true,
      zoomControl: false,
      attributionControl: false,
      scrollWheelZoom: true,
      minZoom: 2,
      maxZoom: 10
    }).setView([20, 10], 2.2);

    L.control.zoom({ position: "bottomleft" }).addTo(map);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 19
    }).addTo(map);

    let posts = [];
    let markers = [];
    let planeMarker = null;
    let routeBefore = null;
    let routeAfter = null;
    let observer = null;
    let activeIndex = 0;
    let animationToken = 0;
    const galleryIntervals = new Map();

    function parseCsvData(csvText) {
      const cleaned = String(csvText || "").replace(/^\uFEFF/, "");
      const result = Papa.parse(cleaned, { header: true, skipEmptyLines: "greedy", dynamicTyping: false });

      return (result.data || []).map((row, index) => {
        const lat = parseFloat(String(row[CSV_FIELDS.lat] || "").trim());
        const lng = parseFloat(String(row[CSV_FIELDS.lng] || "").trim());
        const explicitImages = parseExplicitImages(row[CSV_FIELDS.images]);
        const folderImages = buildNumberedImages(
          row[CSV_FIELDS.imageFolder],
          row[CSV_FIELDS.imageCount],
          row[CSV_FIELDS.imageExt]
        );
        const story = String(row[CSV_FIELDS.story] || "").trim();
        const summary = String(row[CSV_FIELDS.summary] || "").trim() || splitParagraphs(story)[0] || "";

        return {
          id: String(row[CSV_FIELDS.id] || index + 1).trim(),
          slug: String(row[CSV_FIELDS.slug] || `post-${index + 1}`).trim(),
          city: String(row[CSV_FIELDS.city] || `City ${index + 1}`).trim(),
          country: String(row[CSV_FIELDS.country] || "").trim(),
          lat,
          lng,
          title: String(row[CSV_FIELDS.title] || row[CSV_FIELDS.city] || `Post ${index + 1}`).trim(),
          date: String(row[CSV_FIELDS.date] || "").trim(),
          summary,
          story,
          images: explicitImages.length ? explicitImages : folderImages,
          imageAlt: String(row[CSV_FIELDS.imageAlt] || row[CSV_FIELDS.title] || "").trim(),
          themeColor: normalizeColor(row[CSV_FIELDS.themeColor], index)
        };
      }).filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng));
    }

    function normalizeColor(value, index) {
      const trimmed = String(value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(trimmed)) return trimmed;
      return GAY_MEN_FLAG_COLORS[index % GAY_MEN_FLAG_COLORS.length];
    }

    function parseExplicitImages(value) {
      return String(value || "")
        .split("|")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function buildNumberedImages(folder, count, ext) {
      const cleanFolder = String(folder || "").trim().replace(/\/+$/, "");
      const total = parseInt(String(count || "").trim(), 10);
      const cleanExt = String(ext || "jpg").trim().replace(/^\./, "");

      if (!cleanFolder || !Number.isFinite(total) || total < 1) return [];

      return Array.from({ length: total }, (_, imageIndex) => `${cleanFolder}/${imageIndex + 1}.${cleanExt}`);
    }

    async function loadPosts() {
      try {
        const response = await fetch(csvUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`Failed to load CSV: ${response.status}`);
        posts = parseCsvData(await response.text());
      } catch (error) {
        console.error(error);
        posts = [];
      }

      if (!posts.length) {
        feedInner.innerHTML = '<div class="post"><div class="post-card"><div class="post-content"><h2>No valid posts found</h2><p class="summary">Provide a CSV with city, lat, lng, title, and story fields.</p></div></div></div>';
        return;
      }

      renderFeed();
      renderMap();
      setupFeedInteractions();
      setupObserver();
      postCount.textContent = String(posts.length);
      setTimeout(() => activatePost(0, false), 120);
    }

    function renderFeed() {
      feedInner.innerHTML = posts.map((post, index) => {
        const style = `style="--accentStripe: linear-gradient(180deg, ${escapeAttr(post.themeColor)}, rgba(255,255,255,0.14));"`;
        const paragraphs = splitParagraphs(post.story);
        const detailParagraphs = paragraphs.length ? paragraphs : [post.summary];
        const media = post.images.length ? buildGallery(post, index) : '<div class="post-media"><div class="empty-media">Story stop ' + (index + 1) + "</div></div>";
        return `
          <article class="post" id="${escapeAttr(post.slug)}" data-index="${index}">
            <div class="post-card" ${style}>
              ${media}
              <div class="post-content">
                <div class="meta-row">
                  <span class="chip city">${escapeHtml(post.city)}${post.country ? `, ${escapeHtml(post.country)}` : ""}</span>
                  ${post.date ? `<span class="chip date">${escapeHtml(post.date)}</span>` : ""}
                </div>
                <h2>${escapeHtml(post.title)}</h2>
                <p class="summary">${escapeHtml(post.summary)}</p>
                <button class="expand-toggle" type="button" data-expand="${index}" aria-expanded="false">Open story</button>
                <div class="story-panel" id="story-panel-${index}" aria-hidden="true">
                  <div class="story-scroll">
                    ${detailParagraphs.map(p => `<p>${escapeHtml(p)}</p>`).join("")}
                  </div>
                </div>
              </div>
            </div>
          </article>`;
      }).join("");
      startGalleries();
    }

    function buildGallery(post, index) {
      return `
        <div class="post-media" data-gallery="${index}">
          <div class="gallery-track">
            ${post.images.map((img, imgIndex) => `
              <div class="gallery-slide${imgIndex === 0 ? " active" : ""}" data-slide="${imgIndex}">
                <img loading="lazy" src="${escapeAttr(img)}" alt="${escapeAttr(post.imageAlt || post.title)}">
              </div>`).join("")}
          </div>
          <div class="gallery-dots">
            ${post.images.map((_, imgIndex) => `<span class="gallery-dot${imgIndex === 0 ? " active" : ""}" data-dot="${imgIndex}"></span>`).join("")}
          </div>
        </div>`;
    }

    function splitParagraphs(body) {
      return String(body || "").split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
    }

    function startGalleries() {
      galleryIntervals.forEach(id => clearInterval(id));
      galleryIntervals.clear();
      document.querySelectorAll("[data-gallery]").forEach(gallery => {
        const index = Number(gallery.dataset.gallery);
        const slides = Array.from(gallery.querySelectorAll(".gallery-slide"));
        const dots = Array.from(gallery.querySelectorAll(".gallery-dot"));
        if (slides.length < 2) return;
        let current = 0;
        const apply = next => {
          current = next;
          slides.forEach((slide, i) => slide.classList.toggle("active", i === current));
          dots.forEach((dot, i) => dot.classList.toggle("active", i === current));
        };
        const intervalId = setInterval(() => apply((current + 1) % slides.length), 3200 + (index % 3) * 260);
        galleryIntervals.set(index, intervalId);
      });
    }

    function renderMap() {
      markers.forEach(marker => marker.remove());
      markers = [];
      if (routeBefore) routeBefore.remove();
      if (routeAfter) routeAfter.remove();
      if (planeMarker) planeMarker.remove();

      const bounds = [];
      posts.forEach((post, index) => {
        const icon = L.divIcon({
          className: "custom-pin-icon",
          html: `
            <div class="pin-wrap" style="--pinColor:${escapeAttr(post.themeColor)}">
              <button class="pin" type="button" aria-label="Jump to ${escapeAttr(post.city)}"></button>
              <div class="city-label">${escapeHtml(post.city)}</div>
            </div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        });
        const marker = L.marker([post.lat, post.lng], { icon, keyboard: false }).addTo(map);
        marker.on("click", () => scrollToPost(index));
        marker.bindPopup(`<strong>${escapeHtml(post.city)}</strong><br>${escapeHtml(post.title)}`);
        markers.push(marker);
        bounds.push([post.lat, post.lng]);
      });

      if (bounds.length === 1) map.setView(bounds[0], 4);
      else map.fitBounds(bounds, { padding: [70, 70], maxZoom: 4 });

      planeMarker = L.marker([posts[0].lat, posts[0].lng], {
        interactive: false,
        icon: L.divIcon({
          className: "plane-marker",

559.269531 291.300781C559.269531 286.523438 555.378906 282.632812 550.601562 282.632812L539.855469 282.632812C535.078125 282.632812 531.257812 286.523438 531.257812 291.300781L531.257812 299.972656C532.472656 312.042969 524.542969 314.464844 519.222656 308.640625L444.855469 243.332031C441.390625 240.203125 441.0625 238.285156 440.703125 233.914062L440.703125 136.683594C440.46875 127.070312 439.953125 116.292969 438.894531 107.511719C434.5625 73.457031 421.367188 -0.03125 404.957031 8.175781Z" fill="#FFFFFF"/>
              </svg>
            </div>`,
          iconSize: [34, 34],
          iconAnchor: [17, 17]
        })
      }).addTo(map);
    }

    function setupFeedInteractions() {
      document.querySelectorAll("[data-expand]").forEach(button => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.expand);
          const panel = document.getElementById(`story-panel-${index}`);
          const isOpen = panel.classList.toggle("open");
          panel.setAttribute("aria-hidden", String(!isOpen));
          button.setAttribute("aria-expanded", String(isOpen));
          button.textContent = isOpen ? "Close story" : "Open story";
        });
      });
    }

    function setupObserver() {
      if (observer) observer.disconnect();
      const sections = Array.from(document.querySelectorAll(".post"));
      observer = new IntersectionObserver(entries => {
        const visible = entries.filter(entry => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio);
        if (!visible.length) return;
        const index = Number(visible[0].target.dataset.index);
        if (!Number.isNaN(index)) activatePost(index, true);
      }, {
        root: feed,
        threshold: [0.25, 0.45, 0.65, 0.82],
        rootMargin: "-10% 0px -20% 0px"
      });
      sections.forEach(section => observer.observe(section));
    }

    function scrollToPost(index) {
      const target = document.querySelector(`.post[data-index="${index}"]`);
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
      activatePost(index, true);
    }

    function activatePost(index, panMap = true) {
      if (!posts[index] || index === activeIndex && planeMarker) {
        updateActiveUI(index);
        updateRoutes(index);
        return;
      }

      const previousIndex = activeIndex;
      activeIndex = index;
      updateActiveUI(index);
      if (panMap) {
        map.flyTo([posts[index].lat, posts[index].lng], idealZoom(), { duration: 1.2, easeLinearity: 0.22 });
      }
      animatePlane(previousIndex, index);
    }

    function updateActiveUI(index) {
      document.querySelectorAll(".post").forEach(el => el.classList.toggle("active", Number(el.dataset.index) === index));
      markers.forEach((marker, i) => {
        const el = marker.getElement();
        if (!el) return;
        const wrap = el.querySelector(".pin-wrap");
        if (wrap) wrap.classList.toggle("active", i === index);
      });
    }

    function idealZoom() {
      if (window.innerWidth < 980) return 3.2;
      return Math.min(4.8, Math.max(3.2, map.getZoom()));
    }

    function updateRoutes(index) {
      if (routeBefore) routeBefore.remove();
      if (routeAfter) routeAfter.remove();

      const previousPoints = posts.slice(0, index + 1).map(p => [p.lat, p.lng]);
      const futurePoints = posts.slice(index).map(p => [p.lat, p.lng]);

      if (previousPoints.length > 1) {
        routeBefore = L.polyline(previousPoints, {
          color: "#FFFFFF",
          weight: 3,
          opacity: 0.28,
          smoothFactor: 1.2,
          className: "route-line-before",
          interactive: false
        }).addTo(map);
      }

      if (futurePoints.length > 1) {
        routeAfter = L.polyline(futurePoints, {
          color: "#FFFFFF",
          weight: 2.5,
          opacity: 0.16,
          dashArray: "8 10",
          smoothFactor: 1.2,
          className: "route-line-after",
          interactive: false
        }).addTo(map);
      }
    }

    function animatePlane(fromIndex, toIndex) {
      if (!planeMarker || !posts[toIndex]) return;
      const token = ++animationToken;
      const from = posts[fromIndex] || posts[toIndex];
      const to = posts[toIndex];
      const bearing = getBearing(from.lat, from.lng, to.lat, to.lng);
      updateRoutes(toIndex);

      if (fromIndex === toIndex) {
        setPlane(to.lat, to.lng, bearing);
        return;
      }

      const duration = 1200;
      const start = performance.now();
      function frame(now) {
        if (token !== animationToken) return;
        const t = Math.min(1, (now - start) / duration);
        const eased = easeInOutCubic(t);
        const lat = from.lat + (to.lat - from.lat) * eased;
        const lng = interpolateLng(from.lng, to.lng, eased);
        setPlane(lat, lng, bearing);
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function setPlane(lat, lng, bearingDeg) {
      planeMarker.setLatLng([lat, lng]);
      const el = planeMarker.getElement();
      if (!el) return;
      const plane = el.querySelector(".plane-icon");
      if (plane) plane.style.transform = `rotate(${bearingDeg}deg)`;
    }

    function getBearing(lat1, lon1, lat2, lon2) {
      const toRad = deg => deg * Math.PI / 180;
      const toDeg = rad => rad * 180 / Math.PI;
      const phi1 = toRad(lat1);
      const phi2 = toRad(lat2);
      const lambda1 = toRad(lon1);
      const lambda2 = toRad(lon2);
      const y = Math.sin(lambda2 - lambda1) * Math.cos(phi2);
      const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(lambda2 - lambda1);
      return toDeg(Math.atan2(y, x));
    }

    function interpolateLng(fromLng, toLng, t) {
      let delta = toLng - fromLng;
      if (Math.abs(delta) > 180) delta -= Math.sign(delta) * 360;
      let value = fromLng + delta * t;
      if (value > 180) value -= 360;
      if (value < -180) value += 360;
      return value;
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    loadPosts();
  </script>

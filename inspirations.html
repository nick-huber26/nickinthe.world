<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspirations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/shared.css" />
  <link rel="stylesheet" href="styles/inspirations.css" />
</head>
<body class="inspirations-page">
  <main class="inspirations-shell" data-inspirations-shell>
    <section class="wall-pane" aria-label="Inspirations poster wall">
      <div class="wall-topbar">
        <div class="wall-copy">
          <h1>Inspirations</h1>
          <p>Books, films, podcasts, and other works that sparked the journey. Drag the wall, scroll to zoom, and tap a poster to open its notes.</p>
        </div>
        <div class="wall-meta">
          <div class="inspirations-count"><span id="inspirationCount">0</span> inspirations</div>
          <div class="wall-controls" aria-label="Wall zoom controls">
            <button id="zoomOutButton" class="wall-control" type="button" aria-label="Zoom out">-</button>
            <button id="resetWallButton" class="wall-control" type="button">Reset</button>
            <button id="zoomInButton" class="wall-control" type="button" aria-label="Zoom in">+</button>
          </div>
        </div>
      </div>

      <div id="wallViewport" class="wall-viewport" tabindex="0" aria-label="Poster wall viewport">
        <div id="posterWall" class="poster-wall" data-poster-wall></div>
      </div>
    </section>

    <aside id="inspirationPanel" class="inspiration-panel" aria-hidden="true">
      <button id="closePanelButton" class="panel-close" type="button" aria-label="Close inspiration panel">×</button>
      <div id="panelContent" class="panel-content">
        <div class="panel-empty">
          <div class="panel-empty-eyebrow">Select a poster</div>
          <h2>Open an inspiration</h2>
          <p>Choose any poster on the wall to reveal the story, tags, and context behind it.</p>
        </div>
      </div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="scripts/site-data.js"></script>
  <script src="scripts/inspirations-page.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/shared.css" />
  <link rel="stylesheet" href="styles/stories.css" />
</head>
<body class="stories-page">
  <main class="stories-shell">
    <section class="stories-hero">
      <div class="hero-copy">
        <h1>Browse the stories</h1>
        <p>A gallery of visual story fragments tied to cities and, when useful, to the larger connections that run between them. Each CSV row becomes one tile in the grid.</p>
      </div>
      <div class="hero-meta">
        <div class="stories-count"><span id="storyCount">0</span> stories</div>
      </div>
    </section>

    <section class="stories-panel">
      <div id="storiesGrid" class="stories-grid"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="scripts/site-data.js"></script>
  <script src="scripts/stories-page.js"></script>
</body>
</html>

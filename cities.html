<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles/shared.css" />
  <link rel="stylesheet" href="styles/map.css" />
</head>
<body class="map-page">
  <div class="shell">
    <section class="map-pane">
      <div id="map"></div>
      <div class="map-overlay"></div>
      <div class="brand">
        <h1>Explore Cities</h1>
        <p>Navigate between destinations on the map, or move through the timeline to follow trips chronologically. Tap the tags to view connections and stories.</p>
      </div>
      <div class="floating-zoom-controls map-controls" aria-label="Map zoom controls">
        <button id="zoomOutMapButton" class="floating-zoom-button" type="button" aria-label="Zoom out">-</button>
        <button id="resetMapButton" class="floating-zoom-button floating-zoom-button-reset" type="button">reset</button>
        <button id="zoomInMapButton" class="floating-zoom-button" type="button" aria-label="Zoom in">+</button>
      </div>
    </section>

    <section class="feed-pane">
      <div class="feed-topbar">
        <div class="timeline-nav">
          <button id="prevVisit" class="nav-button" type="button">Previous</button>
          <button id="currentVisitCard" class="timeline-current timeline-current-button" type="button">
            <strong id="currentDate">Loading</strong>
            <span id="currentPlace">Trip</span>
          </button>
          <button id="nextVisit" class="nav-button" type="button">Next</button>
        </div>
        <div class="feed-meta">
          <div class="feed-count"><span id="cityCount">0</span> cities / <span id="countryCount">0</span> countries</div>
        </div>
      </div>
      <div id="feed"><div id="feedInner" class="feed-inner"></div></div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="scripts/site-data.js"></script>
  <script src="scripts/map-page.js"></script>
</body>
</html>

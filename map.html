<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles/shared.css" />
  <link rel="stylesheet" href="styles/embed-map.css" />
</head>
<body class="embed-map-page">
  <main class="embed-map-shell" aria-label="Animated journey map">
    <div id="map" aria-hidden="true"></div>
    <div class="map-overlay"></div>
    <div class="map-frame"></div>
    <div class="map-status" id="mapStatus">Loading map...</div>
    <div class="map-counts" id="mapCounts" hidden>
      <span id="cityCount">0</span> cities / <span id="countryCount">0</span> countries
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="scripts/site-data.js"></script>
  <script src="scripts/embed-map-page.js"></script>
</body>
</html>
